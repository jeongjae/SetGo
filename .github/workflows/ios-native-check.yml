name: iOS Native Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ios-native-check.yml'
      - 'capacitor.config.ts'
      - 'ios/**'
      - 'package-lock.json'
      - 'package.json'
      - 'src/**'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'index.html'
      - 'public/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  simulator-build:
    name: Build iOS Simulator App
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor iOS project
        run: npm run native:sync

      - name: Build unsigned simulator app
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build/ios-derived-data \
            CODE_SIGNING_ALLOWED=NO \
            build | tee build/ios-simulator-build.log

      - name: Package simulator app artifact
        run: |
          mkdir -p build/artifacts
          ditto -c -k --keepParent \
            build/ios-derived-data/Build/Products/Debug-iphonesimulator/App.app \
            build/artifacts/SetGo-simulator-app.zip

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: SetGo-simulator-app
          path: build/artifacts/SetGo-simulator-app.zip
          retention-days: 14

      - name: Upload native build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-native-build-log
          path: build/ios-simulator-build.log
          retention-days: 14
