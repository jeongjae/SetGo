name: iOS Native Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ios-native-check.yml'
      - 'capacitor.config.ts'
      - 'ios/**'
      - 'package-lock.json'
      - 'package.json'
      - 'src/**'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'index.html'
      - 'public/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  simulator-build:
    name: Build iOS Simulator App
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor iOS project
        run: npm run native:sync

      - name: Build unsigned simulator app
        run: >
          xcodebuild
          -project ios/App/App.xcodeproj
          -scheme App
          -configuration Debug
          -sdk iphonesimulator
          -destination 'platform=iOS Simulator,name=iPhone 16'
          CODE_SIGNING_ALLOWED=NO
          build
